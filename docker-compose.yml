version: '3.8'

services:
  webpage-monitor:
    build: .
    container_name: webpage-monitor
    environment:
      # 請修改以下帳號密碼
      - WEB_USERNAME=your_username
      - WEB_PASSWORD=your_password
      - WEB_URL=https://www.cs.ccu.edu.tw/~damon/secure/course-wk.html
      # 可選：Line Notify Token
      # - LINE_NOTIFY_TOKEN=your_line_notify_token
    volumes:
      # 將資料持久化到本機
      - ./data:/data
    restart: unless-stopped
    # 使用 cron 定期執行（需要額外設定）
    # 或者使用外部的 cron 來觸發容器
